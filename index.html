<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SariTech Owner Daily Sales</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #64748b;
      --border: #dbe3ef;
      --blue: #2563eb;
      --green: #15803d;
      --red: #b91c1c;
      --shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }
    button, input, select { font: inherit; }
    .page {
      width: min(1100px, 100%);
      margin: 0 auto;
      padding: 22px;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    h1, h2, h3, p { margin: 0; }
    h1 {
      font-size: clamp(24px, 4vw, 36px);
      letter-spacing: 0;
    }
    .subtitle {
      color: var(--muted);
      margin-top: 6px;
      font-size: 14px;
    }
    .controls {
      display: flex;
      align-items: end;
      gap: 10px;
      flex-wrap: wrap;
    }
    label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }
    input, select {
      min-height: 40px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      padding: 8px 10px;
      outline: none;
    }
    input:focus, select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.13);
    }
    button {
      min-height: 40px;
      border: 0;
      border-radius: 8px;
      background: var(--blue);
      color: #fff;
      cursor: pointer;
      font-weight: 800;
      padding: 9px 14px;
    }
    .status {
      min-height: 44px;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card);
      box-shadow: var(--shadow);
      color: var(--muted);
      padding: 12px 14px;
      margin-bottom: 16px;
    }
    .status.error {
      border-color: #fecaca;
      background: #fff1f2;
      color: var(--red);
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--muted);
      flex: 0 0 auto;
    }
    .dot.ok { background: var(--green); }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .card {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card);
      box-shadow: var(--shadow);
      min-height: 118px;
      padding: 16px;
      display: grid;
      align-content: space-between;
      gap: 12px;
    }
    .card span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
    }
    .card strong {
      display: block;
      font-size: clamp(24px, 4vw, 34px);
      line-height: 1.05;
    }
    .positive { color: var(--green); }
    .negative { color: var(--red); }
    .panel {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
    }
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      min-width: 720px;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      border-bottom: 1px solid var(--border);
      padding: 12px 10px;
      text-align: left;
    }
    th {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
    }
    .amount { font-weight: 800; white-space: nowrap; }
    .empty {
      border: 1px dashed var(--border);
      border-radius: 8px;
      color: var(--muted);
      margin: 16px;
      padding: 40px 20px;
      text-align: center;
    }
    @media (max-width: 860px) {
      .topbar { flex-direction: column; align-items: stretch; }
      .controls, label, select, button { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="topbar">
      <div>
        <h1>Owner Daily Sales</h1>
        <p id="branchLabel" class="subtitle">SariTech remote sales monitor</p>
      </div>
      <div class="controls">
        <label>
          Branch
          <select id="branchFilter"></select>
        </label>
        <label>
          Date
          <input id="dateFilter" type="date" />
        </label>
        <button id="refreshBtn" type="button">Refresh</button>
      </div>
    </header>

    <div id="status" class="status">
      <span class="dot"></span>
      <span>Loading daily sales...</span>
    </div>

    <section id="stats" class="stats"></section>

    <section class="panel">
      <div class="panel-head">
        <h2>Daily Reports</h2>
        <p id="reportCount" class="subtitle"></p>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Branch</th>
              <th>Total Sales</th>
              <th>Net Profit</th>
              <th>Expenses</th>
              <th>Transactions</th>
              <th>Sent</th>
            </tr>
          </thead>
          <tbody id="reportsBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    // ==================== CHANGE THIS URL ====================
    const OWNER_SYNC_URL = 'https://script.google.com/macros/s/AKfycbxkGTKS_kkc1UkgX_wgHEiFpyyEC2cCPUYsRFhpZ1Ry-6LKeRd11hAggxUKWmkOfoOR/exec';
    // =======================================================

    const $ = id => document.getElementById(id);
    const moneyFormatter = new Intl.NumberFormat('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const numberFormatter = new Intl.NumberFormat('en-PH');

    let ownerReports = [];

    function todayText() {
      const date = new Date();
      date.setMinutes(date.getMinutes() - date.getTimezoneOffset());
      return date.toISOString().slice(0, 10);
    }

    function money(value) {
      return `PHP ${moneyFormatter.format(Number(value || 0))}`;
    }
    function count(value) {
      return numberFormatter.format(Number(value || 0));
    }
    function safe(value) {
      return String(value ?? '').replace(/[&<>'"]/g, char => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
      }[char]));
    }

    function setStatus(message, ok = true) {
      const statusEl = $('status');
      statusEl.className = ok ? 'status' : 'status error';
      statusEl.innerHTML = `
        <span class="dot ${ok ? 'ok' : ''}"></span>
        <span>${safe(message)}</span>
      `;
    }

    async function loadViaJsonp(url) {
      return new Promise((resolve, reject) => {
        const callbackName = `owner_cb_${Date.now()}`;
        const script = document.createElement('script');
        const separator = url.includes('?') ? '&' : '?';
        
        const timeout = setTimeout(() => {
          cleanup();
          reject(new Error('Request timeout'));
        }, 15000);

        function cleanup() {
          clearTimeout(timeout);
          script.remove();
          delete window[callbackName];
        }

        window[callbackName] = data => {
          cleanup();
          resolve(data);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error('Could not reach owner sync server'));
        };

        script.src = `${url}${separator}action=getAll&callback=${callbackName}&t=${Date.now()}`;
        document.body.appendChild(script);
      });
    }

    function normalizeReports(data) {
      const rows = Array.isArray(data) ? data : (data?.reports || []);
      return rows
        .map(row => ({
          date: row.date || '',
          branchName: row.branchName || 'Unknown Branch',
          branchId: row.branchId || row.branchName || 'UNKNOWN',
          totalSales: Number(row.totalSales || 0),
          netProfit: Number(row.netProfit || 0),
          totalExpenses: Number(row.totalExpenses || 0),
          transactionCount: Number(row.transactionCount || 0),
          sentAt: row.sentAt || ''
        }))
        .sort((a, b) => String(b.date).localeCompare(String(a.date)));
    }

    // ... (rest of functions remain the same - they are already good)

    function getBranches(reports) {
      const branches = new Map();
      reports.forEach(r => {
        const key = r.branchId || r.branchName;
        if (!branches.has(key)) branches.set(key, r.branchName);
      });
      return Array.from(branches.entries())
        .map(([id, name]) => ({id, name}))
        .sort((a,b) => a.name.localeCompare(b.name));
    }

    function populateBranchFilter(reports) {
      const select = $('branchFilter');
      const current = select.value;
      const branches = getBranches(reports);
      
      select.innerHTML = `<option value="">All branches</option>` +
        branches.map(b => `<option value="${safe(b.id)}">${safe(b.name)}</option>`).join('');
      
      if (branches.some(b => b.id === current)) select.value = current;
    }

    function filterReports(reports, branchId) {
      if (!branchId) return reports;
      return reports.filter(r => (r.branchId || r.branchName) === branchId);
    }

    function summarize(reports, date) {
      return reports
        .filter(r => r.date === date)
        .reduce((acc, r) => ({
          totalSales: acc.totalSales + r.totalSales,
          netProfit: acc.netProfit + r.netProfit,
          totalExpenses: acc.totalExpenses + r.totalExpenses,
          transactionCount: acc.transactionCount + r.transactionCount
        }), {totalSales:0, netProfit:0, totalExpenses:0, transactionCount:0});
    }

    function renderStats(summary, label) {
      const cards = [
        ['TOTAL SALES', money(summary.totalSales), label],
        ['NET PROFIT', money(summary.netProfit), 'after expenses', summary.netProfit >= 0 ? 'positive' : 'negative'],
        ['EXPENSES', money(summary.totalExpenses), label],
        ['TRANSACTIONS', count(summary.transactionCount), label]
      ];

      $('stats').innerHTML = cards.map(([title, value, note, cls]) => `
        <div class="card">
          <span>${title}</span>
          <strong class="${cls || ''}">${value}</strong>
          <small>${note}</small>
        </div>
      `).join('');
    }

    function renderTable(reports, selectedDate, selectedBranch) {
      $('reportCount').textContent = `${reports.length} report${reports.length === 1 ? '' : 's'}`;

      if (!reports.length) {
        $('reportsBody').innerHTML = '';
        $('stats').innerHTML = '';
        return;
      }

      $('reportsBody').innerHTML = reports.map(r => `
        <tr>
          <td>${safe(r.date)}</td>
          <td><strong>${safe(r.branchName)}</strong></td>
          <td class="amount">${money(r.totalSales)}</td>
          <td class="amount ${r.netProfit >= 0 ? 'positive' : 'negative'}">${money(r.netProfit)}</td>
          <td class="amount">${money(r.totalExpenses)}</td>
          <td>${count(r.transactionCount)}</td>
          <td>${safe(r.sentAt || '-')}</td>
        </tr>
      `).join('');

      const summary = summarize(reports, selectedDate);
      renderStats(summary, `${selectedDate} / ${selectedBranch || 'All branches'}`);
    }

    async function loadOwnerData() {
      const selectedDate = $('dateFilter').value || todayText();
      const selectedBranch = $('branchFilter').value;

      try {
        setStatus('Loading daily sales...', true);
        const data = await loadViaJsonp(OWNER_SYNC_URL);
        
        ownerReports = normalizeReports(data);
        populateBranchFilter(ownerReports);

        const filtered = filterReports(ownerReports, selectedBranch);
        renderTable(filtered, selectedDate, selectedBranch);

        const branchName = selectedBranch ? 
          ownerReports.find(r => (r.branchId || r.branchName) === selectedBranch)?.branchName || selectedBranch : 
          'All branches';

        $('branchLabel').textContent = `${branchName} remote sales monitor`;
        setStatus(`Updated ${new Date().toLocaleTimeString()}`, true);

      } catch (err) {
        console.error(err);
        setStatus(err.message || 'Could not reach owner sync server. Check OWNER_SYNC_URL and redeploy Google Script.', false);
        renderStats({totalSales:0, netProfit:0, totalExpenses:0, transactionCount:0}, `${selectedDate} / All branches`);
      }
    }

    window.addEventListener('load', () => {
      $('dateFilter').value = todayText();
      $('refreshBtn').addEventListener('click', loadOwnerData);
      $('branchFilter').addEventListener('change', loadOwnerData);
      $('dateFilter').addEventListener('change', loadOwnerData);
      
      loadOwnerData();
      setInterval(loadOwnerData, 90000); // auto refresh every 1.5 minutes
    });
  </script>
</body>
</html>
