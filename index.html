<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SariTech · Owner Sales</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:       #0e1117;
      --ink-2:     #3d4452;
      --ink-3:     #7a8196;
      --ink-4:     #b2b9c9;
      --surface:   #ffffff;
      --surface-2: #f5f6fa;
      --surface-3: #eceef5;
      --border:    #e2e5ef;
      --accent:    #1a56f0;
      --accent-2:  #e8effe;
      --green:     #0e9e6b;
      --green-bg:  #e7f8f2;
      --red:       #d93a3a;
      --red-bg:    #fdeaea;
      --amber:     #c47a10;
      --amber-bg:  #fef3e1;
      --radius:    10px;
      --radius-lg: 16px;
      --mono:      'DM Mono', monospace;
      --sans:      'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--surface-2);
      color: var(--ink);
      font-size: 15px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Top bar ─────────────────────────────── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-mark {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: -0.5px;
    }
    .logo-text {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }
    .logo-sub {
      font-size: 12px;
      color: var(--ink-3);
      font-weight: 400;
    }
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ── Controls ────────────────────────────── */
    .controls-bar {
      padding: 16px 28px;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .field label {
      font-size: 11px;
      font-weight: 600;
      color: var(--ink-3);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }
    .field select,
    .field input[type="date"] {
      height: 38px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0 12px;
      background: var(--surface);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 14px;
      outline: none;
      cursor: pointer;
      transition: border-color .15s;
    }
    .field select:focus,
    .field input[type="date"]:focus {
      border-color: var(--accent);
    }
    .btn {
      height: 38px;
      padding: 0 18px;
      border: none;
      border-radius: var(--radius);
      background: var(--accent);
      color: #fff;
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: opacity .15s, transform .1s;
    }
    .btn:hover { opacity: .88; }
    .btn:active { transform: scale(.97); }
    .btn svg { flex-shrink: 0; }

    /* ── Status pill ─────────────────────────── */
    .status-bar {
      padding: 0 28px 16px;
    }
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 6px 14px;
      border-radius: 999px;
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 12px;
      color: var(--ink-2);
      transition: background .2s, border-color .2s;
    }
    .status-pill.ok    { background: var(--green-bg); border-color: #9de3ca; color: var(--green); }
    .status-pill.error { background: var(--red-bg);   border-color: #f5bfbf; color: var(--red); }
    .status-pill.loading { background: var(--amber-bg); border-color: #f5d9a0; color: var(--amber); }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
    }
    .dot.pulse { animation: pulse 1.4s ease infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

    /* ── Page body ───────────────────────────── */
    .body { padding: 0 28px 40px; }

    /* ── Stat cards ──────────────────────────── */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .stat-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--ink-3);
    }
    .stat-value {
      font-size: 26px;
      font-weight: 600;
      letter-spacing: -1px;
      color: var(--ink);
      line-height: 1;
    }
    .stat-value.mono { font-family: var(--mono); font-size: 22px; }
    .stat-meta {
      font-size: 12px;
      color: var(--ink-3);
      margin-top: 2px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 999px;
    }
    .badge.green { background: var(--green-bg); color: var(--green); }
    .badge.red   { background: var(--red-bg);   color: var(--red); }
    .badge.blue  { background: var(--accent-2); color: var(--accent); }

    /* ── Chart section ───────────────────────── */
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      margin-bottom: 16px;
      overflow: hidden;
    }
    .section-head {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
    }
    .section-meta {
      font-size: 12px;
      color: var(--ink-3);
    }

    /* ── Mini bar chart ──────────────────────── */
    .chart-wrap {
      padding: 20px;
    }
    .bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .bar-row:last-child { margin-bottom: 0; }
    .bar-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--ink-2);
      width: 120px;
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .bar-track {
      flex: 1;
      height: 20px;
      background: var(--surface-3);
      border-radius: 4px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 4px;
      min-width: 4px;
      transition: width .5s cubic-bezier(.4,0,.2,1);
    }
    .bar-val {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      color: var(--ink-2);
      width: 110px;
      text-align: right;
      flex-shrink: 0;
    }

    /* ── Table ───────────────────────────────── */
    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 700px;
    }
    thead th {
      padding: 10px 16px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--ink-3);
      text-align: left;
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface-2); }
    tbody td {
      padding: 12px 16px;
      font-size: 13.5px;
      color: var(--ink);
      vertical-align: middle;
    }
    .td-date {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--ink-3);
    }
    .td-branch {
      font-weight: 600;
    }
    .td-amount {
      font-family: var(--mono);
      font-size: 13px;
      white-space: nowrap;
    }
    .td-amount.pos { color: var(--green); }
    .td-amount.neg { color: var(--red); }
    .td-count {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--ink-2);
    }
    .td-sent {
      font-size: 12px;
      color: var(--ink-3);
      white-space: nowrap;
    }

    /* ── Empty state ─────────────────────────── */
    .empty {
      padding: 60px 20px;
      text-align: center;
      color: var(--ink-3);
    }
    .empty svg { margin-bottom: 12px; opacity: .35; }
    .empty p { font-size: 14px; }

    /* ── Skeleton shimmer ────────────────────── */
    .shimmer {
      background: linear-gradient(90deg, var(--surface-3) 0%, var(--border) 50%, var(--surface-3) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.2s ease infinite;
      border-radius: 4px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .skel-row td > div { height: 14px; margin: 3px 0; }

    @media (max-width: 680px) {
      .topbar  { padding: 0 16px; }
      .controls-bar, .status-bar, .body { padding-left: 16px; padding-right: 16px; }
      .bar-name { width: 80px; }
      .bar-val  { width: 80px; }
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <header class="topbar">
    <div class="logo">
      <div class="logo-mark">ST</div>
      <div>
        <div class="logo-text">SariTech</div>
        <div class="logo-sub">Owner Sales Monitor</div>
      </div>
    </div>
    <div class="topbar-right" id="lastUpdated"></div>
  </header>

  <!-- Controls -->
  <div class="controls-bar">
    <div class="field">
      <label>Branch</label>
      <select id="branchFilter"></select>
    </div>
    <div class="field">
      <label>Date</label>
      <input id="dateFilter" type="date">
    </div>
    <button class="btn" id="refreshBtn">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 7A6 6 0 1 0 7 1M1 7V2M1 7H6" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Refresh
    </button>
  </div>

  <!-- Status -->
  <div class="status-bar">
    <div id="statusPill" class="status-pill loading">
      <span class="dot pulse"></span>
      <span id="statusText">Connecting…</span>
    </div>
  </div>

  <!-- Body -->
  <div class="body">

    <!-- Stat cards -->
    <div class="stats" id="stats">
      <div class="stat-card"><div class="stat-label">Total Sales</div><div class="stat-value mono shimmer" style="height:28px;width:120px;">&nbsp;</div></div>
      <div class="stat-card"><div class="stat-label">Net Profit</div><div class="stat-value mono shimmer" style="height:28px;width:100px;">&nbsp;</div></div>
      <div class="stat-card"><div class="stat-label">Total Expenses</div><div class="stat-value mono shimmer" style="height:28px;width:100px;">&nbsp;</div></div>
      <div class="stat-card"><div class="stat-label">Transactions</div><div class="stat-value shimmer" style="height:28px;width:60px;">&nbsp;</div></div>
    </div>

    <!-- Branch chart -->
    <div class="section" id="chartSection" style="display:none">
      <div class="section-head">
        <span class="section-title">Sales by branch</span>
        <span class="section-meta" id="chartMeta"></span>
      </div>
      <div class="chart-wrap" id="chartBody"></div>
    </div>

    <!-- Reports table -->
    <div class="section">
      <div class="section-head">
        <span class="section-title">Daily reports</span>
        <span class="section-meta" id="reportCount"></span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Branch</th>
              <th>Total Sales</th>
              <th>Net Profit</th>
              <th>Expenses</th>
              <th>Transactions</th>
              <th>Sent</th>
            </tr>
          </thead>
          <tbody id="reportsBody">
            <!-- skeleton -->
            <tr class="skel-row"><td><div class="shimmer"></div></td><td><div class="shimmer"></div></td><td><div class="shimmer"></div></td><td><div class="shimmer"></div></td><td><div class="shimmer"></div></td><td><div class="shimmer"></div></td><td><div class="shimmer"></div></td></tr>
            <tr class="skel-row"><td><div class="shimmer"></div></td><td><div class="shimmer"></div></td><td><div class="shimmer"></div></td><td><div class="shimmer"></div></td><td><div class="shimmer"></div></td><td><div class="shimmer"></div></td><td><div class="shimmer"></div></td></tr>
            <tr class="skel-row"><td><div class="shimmer"></div></td><td><div class="shimmer"></div></td><td><div class="shimmer"></div></td><td><div class="shimmer"></div></td><td><div class="shimmer"></div></td><td><div class="shimmer"></div></td><td><div class="shimmer"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div><!-- /body -->

  <script>
    // ── CONFIG ───────────────────────────────────────────────────────
    const OWNER_SYNC_URL = "https://script.google.com/macros/s/AKfycbxf-08VXu7RTJQWMZCTl02eAb6Xawm5Oocacawl45qfJlYGaPyTR83Zos27CAtnORhj3w/exec";
    // ────────────────────────────────────────────────────────────────

    const $ = id => document.getElementById(id);
    let reports = [];

    function money(v) {
      const n = Number(v || 0);
      return '₱' + n.toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    function cnt(v) { return Number(v || 0).toLocaleString('en-PH'); }

    function setStatus(msg, state = 'loading') {
      const pill = $('statusPill');
      const dot  = pill.querySelector('.dot');
      pill.className = 'status-pill ' + state;
      dot.className  = 'dot' + (state === 'loading' ? ' pulse' : '');
      $('statusText').textContent = msg;
    }

    async function loadData() {
      setStatus('Fetching data…', 'loading');
      try {
        const res = await fetch(`${OWNER_SYNC_URL}?action=getAll&t=${Date.now()}`, {
          method: 'GET', mode: 'cors', cache: 'no-cache'
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (!data.ok) throw new Error(data.error || 'Server error');
        reports = data.reports || [];
        renderAll();
        const now = new Date().toLocaleTimeString('en-PH', { hour: '2-digit', minute: '2-digit' });
        setStatus('Updated ' + now, 'ok');
      } catch (err) {
        setStatus('Could not reach server — check OWNER_SYNC_URL and redeploy', 'error');
        console.error(err);
      }
    }

    function renderAll() {
      const branch = $('branchFilter').value;

      // Rebuild branch filter
      const branchSet = new Map();
      reports.forEach(r => {
        const id = r.branchId || r.branchName;
        if (!branchSet.has(id)) branchSet.set(id, r.branchName || id);
      });
      const sel = $('branchFilter');
      sel.innerHTML = '<option value="">All branches</option>' +
        Array.from(branchSet).map(([id, name]) =>
          `<option value="${id}"${id === branch ? ' selected' : ''}>${name}</option>`
        ).join('');

      const filtered = branch ? reports.filter(r => (r.branchId || r.branchName) === branch) : reports;

      renderStats(filtered);
      renderChart(filtered, branch);
      renderTable(filtered);
      $('reportCount').textContent = `${filtered.length} report${filtered.length === 1 ? '' : 's'}`;
    }

    function renderStats(data) {
      const totSales   = data.reduce((s, r) => s + Number(r.totalSales || 0), 0);
      const totProfit  = data.reduce((s, r) => s + Number(r.netProfit || 0), 0);
      const totExp     = data.reduce((s, r) => s + Number(r.totalExpenses || 0), 0);
      const totTxns    = data.reduce((s, r) => s + Number(r.transactionCount || 0), 0);
      const profitPos  = totProfit >= 0;
      const margin     = totSales ? ((totProfit / totSales) * 100).toFixed(1) : '0.0';

      $('stats').innerHTML = `
        <div class="stat-card">
          <div class="stat-label">Total Sales</div>
          <div class="stat-value mono">${money(totSales)}</div>
          <div class="stat-meta">${data.length} report${data.length === 1 ? '' : 's'} aggregated</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Net Profit</div>
          <div class="stat-value mono ${profitPos ? '' : 'neg'}" style="${profitPos ? 'color:var(--green)' : 'color:var(--red)'}">${money(totProfit)}</div>
          <div class="stat-meta">
            <span class="badge ${profitPos ? 'green' : 'red'}">${profitPos ? '▲' : '▼'} ${Math.abs(margin)}% margin</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Expenses</div>
          <div class="stat-value mono">${money(totExp)}</div>
          <div class="stat-meta">${totSales > 0 ? ((totExp / totSales)*100).toFixed(1) + '% of sales' : '—'}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Transactions</div>
          <div class="stat-value">${cnt(totTxns)}</div>
          <div class="stat-meta">${data.length > 0 ? Math.round(totTxns / data.length) + ' avg per report' : '—'}</div>
        </div>
      `;
    }

    function renderChart(data, activeBranch) {
      if (activeBranch || data.length === 0) {
        $('chartSection').style.display = 'none';
        return;
      }
      // Aggregate by branch
      const byBranch = {};
      data.forEach(r => {
        const id = r.branchId || r.branchName;
        if (!byBranch[id]) byBranch[id] = { name: r.branchName || id, sales: 0 };
        byBranch[id].sales += Number(r.totalSales || 0);
      });
      const sorted = Object.values(byBranch).sort((a, b) => b.sales - a.sales);
      if (sorted.length < 2) { $('chartSection').style.display = 'none'; return; }

      $('chartSection').style.display = '';
      $('chartMeta').textContent = sorted.length + ' branches';
      const max = sorted[0].sales || 1;

      $('chartBody').innerHTML = sorted.map(b => `
        <div class="bar-row">
          <div class="bar-name" title="${b.name}">${b.name}</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${Math.max(2, (b.sales / max) * 100).toFixed(1)}%"></div>
          </div>
          <div class="bar-val">${money(b.sales)}</div>
        </div>
      `).join('');
    }

    function renderTable(data) {
      if (!data.length) {
        $('reportsBody').innerHTML = `
          <tr><td colspan="7">
            <div class="empty">
              <svg width="40" height="40" fill="none" viewBox="0 0 40 40"><rect x="6" y="8" width="28" height="26" rx="3" stroke="currentColor" stroke-width="1.5"/><path d="M13 16h14M13 22h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              <p>No reports found for this selection</p>
            </div>
          </td></tr>`;
        return;
      }
      $('reportsBody').innerHTML = data.map(r => {
        const profit = Number(r.netProfit || 0);
        const sent = r.sentAt ? r.sentAt.substring(0, 16).replace('T', ' ') : '—';
        return `
          <tr>
            <td class="td-date">${r.date || '—'}</td>
            <td class="td-branch">${r.branchName || 'Unknown'}</td>
            <td class="td-amount">${money(r.totalSales)}</td>
            <td class="td-amount ${profit >= 0 ? 'pos' : 'neg'}">${money(r.netProfit)}</td>
            <td class="td-amount">${money(r.totalExpenses)}</td>
            <td class="td-count">${cnt(r.transactionCount)}</td>
            <td class="td-sent">${sent}</td>
          </tr>`;
      }).join('');
    }

    window.addEventListener('load', () => {
      $('dateFilter').value = new Date().toISOString().slice(0, 10);
      $('refreshBtn').onclick = loadData;
      $('branchFilter').onchange = renderAll;
      $('dateFilter').onchange = renderAll;
      loadData();
    });
  </script>
</body>
</html>
